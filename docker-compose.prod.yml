
services:
  frontend:
    build:
      context: ../raizal
      dockerfile: Dockerfile
    pull_policy: always
    ports:
      - "5001:80"
    volumes:
      - ../raizal:/app
      - /app/node_modules
    depends_on:
      - backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: build
    pull_policy: always
    ports:
      - "5002:5000"
    volumes:
      - .:/app
      - /app/node_modules
volumes:
  frontend_modules:
  backend_modules: