
services:
  frontend:
    build:
      context: ../raizal
      dockerfile: Dockerfile
      target: build
    pull_policy: always
    ports:
      - "5173:5173"
    volumes:
      - ../raizal:/app
      - /app/node_modules
    depends_on:
      - backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: build
    pull_policy: always
    ports:
      - "5000:5000"
    volumes:
      - .:/app
      - /app/node_modules
volumes:
  frontend_modules:
  backend_modules: